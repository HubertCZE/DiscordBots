<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maty Hubert | Portfólio</title>
    <link rel="icon" type="image/jpeg" href="Profilovka.jpg">
    <script src="config.js"></script>
    <style>
        :root {
            --barva-text: #ffffff;
            --barva-pozadi: #000000;
            --akcent: #0a84ff;
            --okno-bg: rgba(25, 25, 25, 0.85);
            --lista-bg: rgba(45, 45, 45, 0.95);
            --okraj: rgba(255, 255, 255, 0.2);
            --matrix: #0f0;
        }
        .light {
            --barva-text: #000000;
            --barva-pozadi: #008080;
            --akcent: #000080;
            --okno-bg: #c0c0c0;
            --lista-bg: #000080;
            --okraj: #ffffff #808080 #808080 #ffffff;
            --matrix: #888;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--barva-pozadi);
            color: var(--barva-text);
            transition: background 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .light body {
            background-image: url('Windowspozadi.jpg');
            background-size: cover;
            background-attachment: fixed;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.3;
        }
        .light canvas { display: none; }
        .okno {
            width: 95%;
            max-width: 900px;
            background: var(--okno-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--okraj);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            margin: 10px;
            display: flex;
            flex-direction: column;
        }
        .light .okno {
            border: 3px solid;
            border-color: #fff #808080 #808080 #fff;
            border-radius: 0;
            backdrop-filter: none;
            padding: 2px;
        }
        .lista {
            background: var(--lista-bg);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .ovladani-apple { display: flex; gap: 6px; flex-shrink: 0; }
        .tecka { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
        .t1 { background: #ff5f56; }
        .t2 { background: #ffbd2e; }
        .t3 { background: #27c93f; }
        .lista-vpravo { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .ovladani-win { display: none; gap: 2px; flex-shrink: 0; }
        .win-btn {
            width: 16px;
            height: 14px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: black;
        }
        .light .ovladani-apple { display: none; }
        .light .ovladani-win { display: flex; }
        .win-nadpis { 
            color: white; 
            font-weight: bold; 
            font-family: "MS Sans Serif", sans-serif; 
            font-size: 11px; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin: 0 8px;
            flex-grow: 1;
        }
        .system-time {
            font-family: "MS Sans Serif", "Segoe UI", sans-serif;
            font-size: 11px;
            color: white;
            background: rgba(0,0,0,0.2);
            padding: 2px 8px;
            border-radius: 4px;
            min-width: 140px;
            text-align: right;
        }
        .light .system-time {
            background: #c0c0c0;
            color: black;
            border: 2px inset #fff;
            padding: 1px 4px;
        }
        .prepinac-modu {
            background: var(--akcent);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            font-weight: bold;
        }
        .light .prepinac-modu {
            background: #c0c0c0;
            color: #000;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            border-radius: 0;
        }
        .obsah { padding: 20px; max-height: 85vh; overflow-y: auto; }
        .profil-box { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .fotka {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--akcent);
            object-fit: cover;
            flex-shrink: 0;
        }
        .sekce-karta {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--okraj);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .light .sekce-karta {
            background: #d0d0d0;
            border: 2px solid;
            border-color: #808080 #fff #fff #808080;
            border-radius: 0;
        }
        .stats-top {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 14px;
        }
        .grid-servery { display: flex; flex-direction: column; gap: 15px; }
        .server-row {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--okraj);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap; 
        }
        .light .server-row {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #808080 #fff #fff #808080;
            border-radius: 0;
        }
        .server-info-left { text-align: center; width: 120px; flex-shrink: 0; }
        .server-icon { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--akcent); object-fit: cover; }
        .server-content { flex-grow: 1; min-width: 200px; }
        .server-content h4 { margin: 0 0 5px 0; color: var(--akcent); }
        .server-content p { margin: 0; font-size: 13px; opacity: 0.9; line-height: 1.4; }
        .server-stats-badge {
            font-size: 10px;
            display: flex;
            gap: 8px;
            margin: 5px 0;
            opacity: 0.8;
        }
        .btn-join {
            background: var(--akcent);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            display: inline-block;
            margin-top: 10px;
        }
        .btn-join.inactive { background: gray; opacity: 0.5; pointer-events: none; }
        .light .btn-join {
            background: #c0c0c0;
            color: #000;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            border-radius: 0;
        }
        .form-area { margin: 20px 0; }
        .btn-form {
            display: block;
            background: #db4437;
            color: white;
            text-align: center;
            padding: 15px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
        .form-full-msg {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,0,0,0.1);
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }
        .verim-link { color: #0a84ff; text-decoration: underline; font-weight: bold; cursor: pointer; }
        .back-btn {
            display: inline-flex;
            width: 40px;
            height: 40px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            align-items: center;
            justify-content: center;
            color: black;
            text-decoration: none;
            font-weight: bold;
        }
        .socialy {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
        }
        .footer-text {
            text-align: center;
            font-size: 16px;
            margin-top: 30px;
            padding-bottom: 20px;
        }
        @media (max-width: 600px) {
            .profil-box, .socialy, .server-row { flex-direction: column; text-align: center; }
            .win-nadpis, .system-time { display: none; }
        }
    </style>
</head>
<body>
<canvas id="matrix_rain"></canvas>
<div class="okno">
    <div class="lista">
        <div class="ovladani-apple">
            <div class="tecka t1"></div>
            <div class="tecka t2"></div>
            <div class="tecka t3"></div>
        </div>
        <div class="win-nadpis">C:\Users\MatyHubert\portfolio_v<span id="v-title">0</span>.exe</div>
        <div class="lista-vpravo">
            <div id="clock" class="system-time">00:00:00</div>
            <button id="prepinac" class="prepinac-modu">Mód</button>
            <div class="ovladani-win">
                <div class="win-btn">_</div>
                <div class="win-btn">□</div>
                <div class="win-btn" style="margin-left: 1px;">X</div>
            </div>
        </div>
    </div>
    <div class="obsah">
        <div class="profil-box">
            <img src="Profilovka.jpg" alt="Maty Hubert" class="fotka">
            <div>
                <h2 style="margin:0;">Maty Hubert</h2>
                <p style="margin:3px 0; opacity:0.8; font-size: 14px;">Discord & Telegram Bot Developer</p>
                <p style="margin:0; font-size:12px;">📅 Aktivní: Víkendy + Večery</p>
            </div>
        </div>

        <div class="sekce-karta">
            <div class="stats-top">
                <span>Volná místa: <span id="slots-free">0</span></span>
                <span>Zarezervováno: <span id="slots-res">0</span></span>
            </div>
            <h3>Aktuální projekty & Servery 🤖</h3>
            <div id="server-list" class="grid-servery"></div>
        </div>

        <div class="sekce-karta">
            <h3>Cena & Spolupráce 💰</h3>
            <div id="form-container" class="form-area"></div>
        </div>

        <div class="socialy">
            <span>📧 <b>matyhoboti@gmail.com</b></span>
            <span>👾 <b>hubert_cze</b></span>
        </div>

        <div class="footer-text">
            <b>®MatyHubert | Verze webu: <span id="v-footer">0</span></b>
        </div>
    </div>
</div>

<script>
    const platno = document.getElementById("matrix_rain");
    const kresleni = platno.getContext("2d");
    function nastavitVelikost() {
        platno.width = window.innerWidth;
        platno.height = window.innerHeight;
    }
    nastavitVelikost();
    const pismena = "01010101XY#%&*@$+-".split("");
    const rohlik = 16;
    const sloupce = platno.width / rohlik;
    const kapky = [];
    for (let i = 0; i < sloupce; i++) kapky[i] = 1;
    function prset() {
        kresleni.fillStyle = "rgba(0, 0, 0, 0.05)";
        kresleni.fillRect(0, 0, platno.width, platno.height);
        kresleni.fillStyle = "#0f0";
        kresleni.font = rohlik + "px monospace";
        for (let j = 0; j < kapky.length; j++) {
            const text = pismena[Math.floor(Math.random() * pismena.length)];
            kresleni.fillText(text, j * rohlik, kapky[j] * rohlik);
            if (kapky[j] * rohlik > platno.height && Math.random() > 0.975) kapky[j] = 0;
            kapky[j]++;
        }
    }
    setInterval(prset, 40);

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('cs-CZ');
    }
    setInterval(updateClock, 1000);
    updateClock();

    const tlacitko = document.getElementById("prepinac");
    const html_tag = document.documentElement;
    tlacitko.addEventListener("click", () => {
        html_tag.classList.toggle("light");
    });

    function initWeb() {
        const free = WEB_CONFIG.total_slots - WEB_CONFIG.reserved_slots - WEB_CONFIG.taken_slots;
        document.getElementById('slots-free').innerText = free;
        document.getElementById('slots-res').innerText = WEB_CONFIG.reserved_slots;
        document.getElementById('v-title').innerText = WEB_CONFIG.version;
        document.getElementById('v-footer').innerText = WEB_CONFIG.version;

        const serverList = document.getElementById('server-list');
        WEB_CONFIG.servers.forEach(s => {
            const row = document.createElement('div');
            row.className = 'server-row';
            row.innerHTML = `
                <div class="server-info-left">
                    <img src="${s.image}" class="server-icon">
                </div>
                <div class="server-content">
                    <h4>${s.name}</h4>
                    <div class="server-stats-badge">
                        <span>Místa: ${WEB_CONFIG.total_slots}</span> | 
                        <span>Rezervace: ${s.reserved}</span> | 
                        <span>Obsazeno: ${s.taken}</span>
                    </div>
                    <p>${s.description}</p>
                    <a href="${s.link}" target="_blank" class="btn-join ${s.button_active ? '' : 'inactive'}">
                        ${s.button_active ? 'Připojit na server' : 'Nedostupné'}
                    </a>
                </div>
            `;
            serverList.appendChild(row);
        });

        const formCont = document.getElementById('form-container');
        if (free > 0) {
            formCont.innerHTML = `<a href="${WEB_CONFIG.form_link}" target="_blank" class="btn-form">VYPLNIT FORMULÁŘ PRO ZÁJEMCE</a>`;
        } else {
            formCont.innerHTML = `
                <div class="form-full-msg">
                    <a href="#" class="back-btn">←</a>
                    <span>Všechny místa jsou zarezervované/vybrané, zkus to jindy. <span class="verim-link" onclick="window.open('${WEB_CONFIG.form_link}')">Ja si verim a na limity neverim!</span></span>
                </div>
            `;
        }
    }

    window.onload = initWeb;
</script>
</body>
</html>
